<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<style>
			/* Splash mark: geometry + light/dark tokens — keep in sync with /static/icon.svg */
			#pwa-splash {
				position: fixed;
				inset: 0;
				z-index: 2147483647;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #ffffff;
				transition: opacity 0.38s ease-out, visibility 0.38s ease-out;
			}
			@media (prefers-color-scheme: dark) {
				#pwa-splash {
					background: #0f0f0f;
				}
			}
			#pwa-splash.pwa-splash--hide {
				opacity: 0;
				visibility: hidden;
				pointer-events: none;
			}
			#pwa-splash .pwa-splash__inner {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 1.25rem;
			}
			#pwa-splash .pwa-splash__mark {
				width: min(33vmin, 200px);
				height: min(33vmin, 200px);
			}
			#pwa-splash .mark-bg {
				fill: #ffffff;
			}
			#pwa-splash .mark-line {
				fill: none;
				stroke: #333333;
			}
			#pwa-splash .mark-bullet {
				fill: #333333;
			}
			@media (prefers-color-scheme: dark) {
				#pwa-splash .mark-bg {
					fill: #1a1a1a;
				}
				#pwa-splash .mark-line {
					stroke: #d4d4d4;
				}
				#pwa-splash .mark-bullet {
					fill: #d4d4d4;
				}
			}
			#pwa-splash .splash-dot {
				animation: pwa-splash-dot 2.4s ease-in-out infinite;
			}
			#pwa-splash .splash-dot--1 {
				animation-delay: 0s;
			}
			#pwa-splash .splash-dot--2 {
				animation-delay: 0.35s;
			}
			#pwa-splash .splash-dot--3 {
				animation-delay: 0.7s;
			}
			@keyframes pwa-splash-dot {
				0%,
				100% {
					opacity: 0.4;
				}
				50% {
					opacity: 1;
				}
			}
			#pwa-splash .pwa-splash__spinner {
				width: 28px;
				height: 28px;
				color: #8a8a8a;
				animation: pwa-splash-spin 0.9s linear infinite;
			}
			@media (prefers-color-scheme: dark) {
				#pwa-splash .pwa-splash__spinner {
					color: #707070;
				}
			}
			@keyframes pwa-splash-spin {
				to {
					transform: rotate(360deg);
				}
			}
			@media (prefers-reduced-motion: reduce) {
				#pwa-splash {
					transition: none;
				}
				#pwa-splash .splash-dot {
					animation: none;
				}
				#pwa-splash .pwa-splash__spinner {
					display: none;
				}
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="pwa-splash" aria-hidden="true">
			<div class="pwa-splash__inner">
				<svg
					class="pwa-splash__mark"
					width="512"
					height="512"
					viewBox="0 0 512 512"
					xmlns="http://www.w3.org/2000/svg"
				>
					<rect class="mark-bg" width="512" height="512" rx="64" />
					<path class="mark-line" d="M160 160h192" stroke-width="24" stroke-linecap="round" />
					<path class="mark-line" d="M160 240h192" stroke-width="28" stroke-linecap="round" />
					<path class="mark-line" d="M160 320h128" stroke-width="24" stroke-linecap="round" />
					<circle class="mark-bullet splash-dot splash-dot--1" cx="120" cy="160" r="12" />
					<circle class="mark-bullet splash-dot splash-dot--2" cx="120" cy="240" r="12" />
					<circle class="mark-bullet splash-dot splash-dot--3" cx="120" cy="320" r="12" />
				</svg>
				<svg
					class="pwa-splash__spinner"
					width="32"
					height="32"
					viewBox="0 0 32 32"
					xmlns="http://www.w3.org/2000/svg"
				>
					<circle
						cx="16"
						cy="16"
						r="13"
						fill="none"
						stroke="currentColor"
						stroke-width="2.5"
						stroke-dasharray="20 42"
						stroke-linecap="round"
					/>
				</svg>
			</div>
		</div>
		<noscript>
			<style>
				#pwa-splash {
					display: none !important;
				}
			</style>
		</noscript>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
